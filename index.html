<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Stats de Spotify</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;700;900&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --green: #1DB954;
  --green-glow: rgba(29,185,84,0.35);
  --black: #080808;
  --surface: #111;
  --surface2: #181818;
  --border: #222;
  --text: #f0f0f0;
  --muted: #555;
  --accent: #ff4d6d;
  --gold: #FFD700;
  --silver: #C0C0C0;
  --bronze: #CD7F32;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--black);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Scanline overlay */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  pointer-events: none; z-index: 9999;
}

.wrap { max-width: 1000px; margin: 0 auto; padding: 52px 24px 100px; }

/* ── HEADER ── */
header { margin-bottom: 60px; position: relative; }
.header-glow {
  position: absolute; top: -40px; left: -60px;
  width: 350px; height: 350px;
  background: radial-gradient(ellipse, rgba(29,185,84,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.logo-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
.logo-mark {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  display: grid; place-items: center;
  box-shadow: 0 0 30px var(--green-glow);
}
.logo-mark svg { width: 22px; height: 22px; }
h1 {
  font-family: 'Unbounded', sans-serif;
  font-size: clamp(32px, 6vw, 56px);
  font-weight: 900; letter-spacing: -3px; line-height: 1;
  color: #fff;
}
h1 em { color: var(--green); font-style: normal; }
.tagline { color: var(--muted); font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-top: 12px; }

/* ── SUMMARY CARDS ── */
.summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 12px; margin-bottom: 48px;
}
.s-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px 18px;
  position: relative; overflow: hidden;
  animation: fadeUp 0.5s ease forwards; opacity: 0;
}
.s-card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: var(--green);
  transform: scaleX(0); transform-origin: left;
  transition: transform 0.4s ease;
}
.s-card:hover::before { transform: scaleX(1); }
.s-label { font-size: 9px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.s-value {
  font-family: 'Unbounded', sans-serif; font-size: 28px;
  font-weight: 900; color: var(--green); line-height: 1;
}
.s-sub { font-size: 10px; color: var(--muted); margin-top: 4px; }

/* ── PODIUM ── */
.section-title {
  font-family: 'Unbounded', sans-serif; font-size: 11px;
  font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  color: var(--muted); margin-bottom: 16px;
}
.podium {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 10px; margin-bottom: 48px;
}
.p-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 22px 14px; text-align: center;
  position: relative; overflow: hidden;
  animation: fadeUp 0.5s ease forwards; opacity: 0;
  transition: transform 0.2s, border-color 0.2s;
}
.p-card:hover { transform: translateY(-3px); }
.p-card.gold { border-color: rgba(255,215,0,0.4); }
.p-card.gold::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at top, rgba(255,215,0,0.08) 0%, transparent 65%);
  pointer-events: none;
}
.p-medal { font-size: 26px; margin-bottom: 10px; }
.p-name {
  font-family: 'Unbounded', sans-serif;
  font-size: 12px; font-weight: 700;
  line-height: 1.3; margin-bottom: 6px;
  word-break: break-word;
}
.p-stat { font-size: 11px; color: var(--green); }
.p-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }

/* ── CONTROLS ── */
.controls {
  display: flex; align-items: center;
  gap: 10px; flex-wrap: wrap; margin-bottom: 24px;
}
.pill-group { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 3px; }
.pill-btn {
  background: none; border: none; cursor: pointer;
  padding: 7px 16px; border-radius: 100px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--muted); transition: all 0.2s; white-space: nowrap;
}
.pill-btn.active { background: var(--green); color: #000; }
.pill-btn:hover:not(.active) { color: var(--text); }

.year-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.yr-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; padding: 6px 13px;
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--muted); cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.yr-btn:hover { border-color: var(--green); color: var(--green); }
.yr-btn.active { background: var(--green); border-color: var(--green); color: #000; }

.spacer { flex: 1; }
.search-wrap { position: relative; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
.search {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; padding: 8px 16px 8px 36px;
  font-family: 'DM Mono', monospace; font-size: 12px;
  color: var(--text); outline: none; width: 200px;
  transition: border-color 0.2s, width 0.3s;
}
.search:focus { border-color: var(--green); width: 240px; }
.search::placeholder { color: var(--muted); }

/* ── RESULTS INFO ── */
.results-info { font-size: 11px; color: var(--muted); margin-bottom: 14px; }
.results-info span { color: var(--green); }

/* ── TABLE ── */
.table-wrap {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 13px 18px; text-align: left;
  font-size: 9px; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--muted);
  background: var(--surface2); border-bottom: 1px solid var(--border);
  font-weight: 400;
}
th.th-rank { width: 52px; text-align: center; }
th.th-bar { width: 45%; }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { color: var(--green); }

tbody tr {
  border-bottom: 1px solid #1a1a1a;
  transition: background 0.12s;
  animation: rowSlide 0.25s ease forwards;
  opacity: 0;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(255,255,255,0.025); }

@keyframes rowSlide {
  from { opacity: 0; transform: translateX(-6px); }
  to   { opacity: 1; transform: none; }
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: none; }
}

td { padding: 11px 18px; font-size: 13px; vertical-align: middle; }
td.td-rank { text-align: center; width: 52px; }
.rank-num { color: var(--muted); font-size: 11px; }
.rank-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%;
  font-family: 'Unbounded', sans-serif; font-size: 9px; font-weight: 900;
}
.rk-1 { background: var(--gold); color: #000; }
.rk-2 { background: var(--silver); color: #000; }
.rk-3 { background: var(--bronze); color: #000; }

.td-artist { max-width: 220px; }
.artist-name { font-size: 13px; color: var(--text); word-break: break-word; line-height: 1.3; }
.artist-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
tr.top-row .artist-name { color: var(--green); }

.bar-cell { display: flex; align-items: center; gap: 12px; }
.bar-track {
  flex: 1; height: 3px; background: #222; border-radius: 2px; overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 2px;
  background: var(--green);
  transition: width 0.7s cubic-bezier(.4,0,.2,1);
}
tr.top-row .bar-fill { background: linear-gradient(90deg, var(--green), #7fff9a); }
.bar-val { font-size: 12px; color: var(--muted); white-space: nowrap; min-width: 80px; text-align: right; }

.empty-row td { text-align: center; padding: 60px; color: var(--muted); font-size: 13px; }

/* ── CHART SECTION ── */
.chart-section { margin-top: 52px; }
.year-chart { margin-top: 16px; }
.chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 140px; padding: 0 4px; }
.chart-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
.chart-bar-wrap { width: 100%; flex: 1; display: flex; align-items: flex-end; }
.chart-bar {
  width: 100%; border-radius: 4px 4px 0 0;
  background: var(--border); transition: background 0.2s, height 0.6s ease;
  min-height: 4px;
}
.chart-col.active .chart-bar { background: var(--green); }
.chart-col:hover .chart-bar { background: rgba(29,185,84,0.6); }
.chart-col.active:hover .chart-bar { background: var(--green); }
.chart-label { font-size: 9px; color: var(--muted); writing-mode: horizontal-tb; white-space: nowrap; }
.chart-col.active .chart-label { color: var(--green); }
.chart-val { font-size: 9px; color: var(--muted); }
.chart-col.active .chart-val { color: var(--green); }

@media (max-width: 600px) {
  .podium { grid-template-columns: 1fr; }
  .summary { grid-template-columns: 1fr 1fr; }
  .search { width: 150px; }
  .search:focus { width: 180px; }
  h1 { letter-spacing: -2px; }
}
</style>
</head>

let metric = 'plays';  // 'plays' | 'hours'
let selectedYear = 'all';
let sortDir = -1;

// ── Build summary ──
function buildSummary() {
  const d = getData();
  const totalMs = Object.values(RAW.allTime).reduce((s,v) => s + v.ms, 0);
  const totalPlays = RAW.totalPlays;
  const artists = Object.keys(RAW.allTime).length;
  const years = RAW.years.length;

  const cards = [
    { label: 'Horas escuchadas', value: totalMs/3600000 > 999 ? (totalMs/3600000/24).toFixed(0)+' días' : (totalMs/3600000).toFixed(0)+'h', sub: (totalMs/3600000).toFixed(1) + ' horas totales' },
    { label: 'Reproducciones', value: totalPlays.toLocaleString(), sub: 'en todos los años' },
    { label: 'Artistas únicos', value: artists.toLocaleString(), sub: 'descubiertos' },
    { label: 'Años de datos', value: years, sub: RAW.years[0] + ' – ' + RAW.years[RAW.years.length-1] },
  ];
  document.getElementById('summary').innerHTML = cards.map((c, i) => `
    <div class="s-card" style="animation-delay:${i*0.07}s">
      <div class="s-label">${c.label}</div>
      <div class="s-value">${c.value}</div>
      <div class="s-sub">${c.sub}</div>
    </div>`).join('');
}

// ── Podium ──
function buildPodium() {
  const top = Object.entries(RAW.allTime)
    .sort((a,b) => b[1].ms - a[1].ms).slice(0, 3);
  const medals = ['🥇','🥈','🥉'];
  const cls = ['gold','',''];
  document.getElementById('podium').innerHTML = top.map(([a,v], i) => `
    <div class="p-card ${cls[i]}" style="animation-delay:${i*0.1}s">
      <div class="p-medal">${medals[i]}</div>
      <div class="p-name">${a}</div>
      <div class="p-stat">${(v.ms/3600000).toFixed(1)}h escuchadas</div>
      <div class="p-sub">${v.plays.toLocaleString()} reproducciones</div>
    </div>`).join('');
}

// ── Year chart ──
function buildChart() {
  const years = RAW.years;
  const vals = years.map(yr => {
    const d = RAW.byYear[yr] || {};
    return metric === 'hours'
      ? Object.values(d).reduce((s,v) => s + v.ms, 0) / 3600000
      : Object.values(d).reduce((s,v) => s + v.plays, 0);
  });
  const max = Math.max(...vals) || 1;
  document.getElementById('chartBars').innerHTML = years.map((yr, i) => {
    const pct = (vals[i] / max * 100).toFixed(1);
    const label = metric === 'hours' ? vals[i].toFixed(0)+'h' : vals[i].toLocaleString();
    const active = selectedYear === yr ? 'active' : '';
    return `<div class="chart-col ${active}" onclick="selectYear('${yr}')">
      <div class="chart-bar-wrap">
        <div class="chart-bar" style="height:${pct}%"></div>
      </div>
      <div class="chart-val">${label}</div>
      <div class="chart-label">${yr}</div>
    </div>`;
  }).join('');
}

// ── Year pills ──
function buildYearPills() {
  const years = RAW.years;
  document.getElementById('yearPills').innerHTML =
    `<div class="yr-btn ${selectedYear==='all'?'active':''}" onclick="selectYear('all')">Todos</div>` +
    years.map(y => `<div class="yr-btn ${selectedYear===y?'active':''}" onclick="selectYear('${y}')">${y}</div>`).join('');
}

function selectYear(y) {
  selectedYear = y;
  buildYearPills();
  buildChart();
  renderTable();
  document.getElementById('tableTitle').textContent =
    y === 'all' ? '🎵 Artistas más escuchados — Todos los años'
                : `🎵 Artistas más escuchados — ${y}`;
}

// ── Metric toggle ──
function setMetric(m) {
  metric = m;
  document.getElementById('btnPlays').classList.toggle('active', m==='plays');
  document.getElementById('btnHours').classList.toggle('active', m==='hours');
  document.getElementById('thSort').textContent = m==='plays' ? 'Reproducciones ↕' : 'Horas escuchadas ↕';
  buildChart();
  renderTable();
}

function toggleSort() { sortDir *= -1; renderTable(); }

// ── Get data for current year selection ──
function getData() {
  if (selectedYear === 'all') return RAW.allTime;
  return RAW.byYear[selectedYear] || {};
}

  document.getElementById('resultsInfo').innerHTML =
    q ? `Mostrando <span>${entries.length}</span> resultados para "<span>${q}</span>"`
      : `<span>${entries.length.toLocaleString()}</span> artistas ${selectedYear === 'all' ? 'en total' : 'en ' + selectedYear}`;

  if (!entries.length) {
    tbody.innerHTML = '<tr><td colspan="3" class="empty-row">Sin resultados 🔍</td></tr>';
    return;
  }

  tbody.innerHTML = entries.map(([artist, v], i) => {
    const rank = i + 1;
    const val = metric === 'hours' ? v.ms / 3600000 : v.plays;
    const pct = (val / max * 100).toFixed(1);
    const label = metric === 'hours'
      ? val.toFixed(2) + 'h'
      : val.toLocaleString() + ' reprod.';
    const sub = metric === 'hours'
      ? v.plays.toLocaleString() + ' reproducciones'
      : (v.ms/3600000).toFixed(1) + 'h escuchadas';

    let rankCell;
    if (rank <= 3 && !q) {
      rankCell = `<span class="rank-badge rk-${rank}">${rank}</span>`;
    } else {
      rankCell = `<span class="rank-num">${rank}</span>`;
    }

    const topCls = (rank <= 3 && !q) ? 'top-row' : '';
    const delay = Math.min(i * 0.025, 0.5);

    return `<tr class="${topCls}" style="animation-delay:${delay}s">
      <td class="td-rank">${rankCell}</td>
      <td class="td-artist">
        <div class="artist-name">${artist}</div>
        <div class="artist-sub">${sub}</div>
      </td>
      <td>
        <div class="bar-cell">
          <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          <span class="bar-val">${label}</span>
        </div>
      </td>
    </tr>`;
  }).join('');
}

// ── Init ──
buildSummary();
buildPodium();
buildYearPills();
buildChart();
renderTable();
</script>
